version: "3.9"

services:

  # ── Base de datos ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: tablon_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: tablon_db
      MYSQL_USER: tablon_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-tablon1234}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend FastAPI ────────────────────────────────────────────
  backend:
    build:
      context: ./tablon_backend
      dockerfile: Dockerfile
    container_name: tablon_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: tablon_db
      DB_USER: tablon_user
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend React + Nginx ─────────────────────────────────────
  frontend:
    build:
      context: ./tablon_frontend
      dockerfile: Dockerfile
    container_name: tablon_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
